<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Page Not Found | TapKaro</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:#060609;color:#f0ede6;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
h1{font-size:120px;font-weight:800;letter-spacing:-4px;background:linear-gradient(135deg,#4f8cff,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
h2{font-size:24px;font-weight:700;margin:12px 0 8px}
p{font-size:15px;color:#9a97a0;margin-bottom:28px}
a{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;border-radius:10px;background:#f0ede6;color:#060609;font-size:14px;font-weight:600;text-decoration:none;transition:all 0.3s}
a:hover{background:#4f8cff;color:#fff;transform:translateY(-2px)}
</style>
</head>
<body>
<h1>404</h1>
